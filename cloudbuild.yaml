# Cloud Build config for deploying PR Pilot to Cloud Run
# gcloud builds submit --config cloudbuild.yaml .

steps:
  # Build the container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-pilot/pr-pilot:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-pilot/pr-pilot:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-pilot/pr-pilot:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'pr-pilot'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-pilot/pr-pilot:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '600'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest'
      - '--set-secrets'
      - 'GITHUB_APP_PRIVATE_KEY=github-app-private-key:latest'
      - '--set-env-vars'
      - 'GITHUB_APP_ID=$_GITHUB_APP_ID,GITHUB_WEBHOOK_SECRET=$_GITHUB_WEBHOOK_SECRET'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-pilot/pr-pilot:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-pilot/pr-pilot:latest'

substitutions:
  _GITHUB_APP_ID: ''
  _GITHUB_WEBHOOK_SECRET: ''

timeout: 1200s
