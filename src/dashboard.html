<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Pilot — Agent Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #a371f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 800; }

  .reviews { display: flex; flex-direction: column; gap: 12px; }
  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .review-card:hover { border-color: var(--accent); }

  .review-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .review-id { font-size: 12px; color: var(--muted); font-family: monospace; }
  .review-decision {
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .decision-approve { background: rgba(63, 185, 80, 0.15); color: var(--green); }
  .decision-changes { background: rgba(210, 153, 34, 0.15); color: var(--orange); }
  .decision-escalate { background: rgba(248, 81, 73, 0.15); color: var(--red); }

  .agent-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .agent-badge {
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 4px;
    text-align: center;
    font-weight: 600;
  }
  .agent-pass { background: rgba(63, 185, 80, 0.1); color: var(--green); }
  .agent-fail { background: rgba(248, 81, 73, 0.1); color: var(--red); }
  .agent-skip { background: rgba(139, 148, 158, 0.1); color: var(--muted); }
  .agent-escalate { background: rgba(210, 153, 34, 0.1); color: var(--orange); }

  .review-summary { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  .detail-panel {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .detail-panel.open { display: block; }
  .finding-item {
    font-size: 12px;
    padding: 8px;
    margin-bottom: 4px;
    border-radius: 4px;
    border-left: 3px solid;
  }
  .finding-critical { background: rgba(248, 81, 73, 0.08); border-color: var(--red); }
  .finding-high { background: rgba(210, 153, 34, 0.08); border-color: var(--orange); }
  .finding-medium { background: rgba(139, 148, 158, 0.08); border-color: var(--muted); }
  .finding-low { background: rgba(88, 166, 255, 0.08); border-color: var(--accent); }

  .timeline {
    display: flex;
    align-items: center;
    gap: 4px;
    margin: 12px 0;
    font-size: 11px;
    color: var(--muted);
  }
  .timeline-bar {
    height: 2px;
    background: var(--border);
    flex: 1;
    position: relative;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  .refresh-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--muted);
  }
  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .refresh-btn:hover { border-color: var(--accent); }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .agent-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>PR Pilot — Agent Dashboard</h1>
  <p class="subtitle">Real-time agent execution log. Every PR review, every agent decision.</p>

  <div class="refresh-bar">
    <span id="refresh-time">Loading...</span>
    <button class="refresh-btn" onclick="loadReviews()">Refresh</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total Reviews</div>
      <div class="stat-value" id="stat-total" style="color: var(--accent)">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Autonomous %</div>
      <div class="stat-value" id="stat-auto" style="color: var(--green)">0%</div>
    </div>
    <div class="stat">
      <div class="stat-label">Avg Duration</div>
      <div class="stat-value" id="stat-duration" style="color: var(--purple)">0s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Bugs Found</div>
      <div class="stat-value" id="stat-bugs" style="color: var(--red)">0</div>
    </div>
  </div>

  <div class="reviews" id="reviews-container">
    <div class="empty-state">
      <h3>No reviews yet</h3>
      <p>Reviews will appear here as PR Pilot processes pull requests.</p>
    </div>
  </div>
</div>

<script>
const AGENT_NAMES = ['reviewer', 'fixer', 'tester', 'verifier', 'escalator'];

function statusClass(status) {
  if (status === 'pass') return 'agent-pass';
  if (status === 'fail') return 'agent-fail';
  if (status === 'skip') return 'agent-skip';
  if (status === 'escalate') return 'agent-escalate';
  return 'agent-skip';
}

function decisionClass(decision) {
  if (decision === 'auto_approve') return 'decision-approve';
  if (decision === 'request_changes') return 'decision-changes';
  if (decision === 'escalate_to_human') return 'decision-escalate';
  return '';
}

function severityClass(severity) {
  if (severity === 'critical') return 'finding-critical';
  if (severity === 'high') return 'finding-high';
  if (severity === 'medium') return 'finding-medium';
  return 'finding-low';
}

async function loadReviews() {
  try {
    const resp = await fetch('/dashboard/reviews');
    const data = await resp.json();
    renderReviews(data.reviews || []);
    document.getElementById('refresh-time').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('refresh-time').textContent = 'Error loading reviews';
    console.error(e);
  }
}

function renderReviews(reviews) {
  const container = document.getElementById('reviews-container');
  if (!reviews.length) {
    container.innerHTML = '<div class="empty-state"><h3>No reviews yet</h3><p>Reviews will appear here as PR Pilot processes pull requests.</p></div>';
    updateStats([]);
    return;
  }

  // Sort newest first
  reviews.sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''));

  updateStats(reviews);

  container.innerHTML = reviews.map((r, i) => {
    const decision = r.decision || r.escalator?.metadata?.decision || 'unknown';
    const autonomy = r.autonomy ? 'Autonomous' : 'Escalated';
    const reviewer = r.reviewer || {};
    const summary = reviewer.summary || r.escalator?.summary || '';
    const findings = reviewer.findings || [];
    const totalDuration = Object.values(r)
      .filter(v => v && v.duration_seconds)
      .reduce((sum, v) => sum + (v.duration_seconds || 0), 0);

    return `
    <div class="review-card" onclick="toggleDetail('detail-${i}')">
      <div class="review-header">
        <div>
          <div class="review-id">${r.chain_id || 'Unknown'} · ${r.repo_name || ''} · PR #${r.pr_number || '?'}</div>
          <div style="font-size:13px;margin-top:4px;">${summary.substring(0, 200)}</div>
        </div>
        <div class="review-decision ${decisionClass(decision)}">${decision.replace(/_/g, ' ')}</div>
      </div>

      <div class="agent-row">
        ${AGENT_NAMES.map(name => {
          const agent = r[name] || {};
          return `<div class="agent-badge ${statusClass(agent.status)}">${name}<br><span style="font-size:10px;opacity:0.8">${agent.status || '?'}</span></div>`;
        }).join('')}
      </div>

      <div class="timeline">
        ${AGENT_NAMES.map(name => {
          const agent = r[name] || {};
          const dur = agent.duration_seconds || 0;
          return `<span>${name}: ${dur}s</span>`;
        }).join(' → ')}
      </div>

      <div style="font-size:11px;color:var(--muted)">
        ${autonomy} · ${totalDuration.toFixed(1)}s total · ${findings.length} findings
      </div>

      <div class="detail-panel" id="detail-${i}">
        ${findings.length ? `
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;">Findings (${findings.length})</div>
          ${findings.map(f => `
            <div class="finding-item ${severityClass(f.severity)}">
              <strong>[${f.severity}] ${f.category}</strong> — ${f.file || ''}:${f.line || ''}<br>
              ${f.description || ''}
            </div>
          `).join('')}
        ` : '<div style="font-size:12px;color:var(--muted)">No findings</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function updateStats(reviews) {
  document.getElementById('stat-total').textContent = reviews.length;

  const autonomous = reviews.filter(r => r.autonomy).length;
  const autoPct = reviews.length ? Math.round(autonomous / reviews.length * 100) : 0;
  document.getElementById('stat-auto').textContent = autoPct + '%';

  const durations = reviews.map(r => {
    return Object.values(r).filter(v => v && v.duration_seconds).reduce((s, v) => s + (v.duration_seconds || 0), 0);
  }).filter(d => d > 0);
  const avgDur = durations.length ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : 0;
  document.getElementById('stat-duration').textContent = avgDur + 's';

  const bugs = reviews.reduce((sum, r) => sum + ((r.reviewer && r.reviewer.findings) || []).length, 0);
  document.getElementById('stat-bugs').textContent = bugs;
}

// Load on page load
loadReviews();
// Auto-refresh every 30 seconds
setInterval(loadReviews, 30000);
</script>
</body>
</html>
